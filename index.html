<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Test Report...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .loader { text-align: center; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p id="status">Looking for the latest execution report...</p>
    </div>

    <script>
        const USER = "josegonzales22";
        const REPO = "Playwright-Template";
        const FOLDER = "playwright-report"; 

        async function buscarUltimoReporte() {
            const statusText = document.getElementById('status');
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                
                if (!response.ok) throw new Error("The playwright-report folder could not be accessed.");

                const files = await response.json();

                const reporteIndex = files.find(file => file.name === "index.html");

                if (!reporteIndex) {
                    statusText.innerText = "index.html not found in playwright-report folder.";
                    return;
                }
                
                statusText.innerText = "Report found. Redirecting...";
                
                window.location.href = reporteIndex.html_url;

            } catch (error) {
                console.error(error);
                statusText.innerHTML = `Error: ${error.message}<br><small>Verify that the repository is public and the report has been uploaded to the gh-pages branch or folder.</small>`;
            }
        }

        buscarUltimoReporte();
    </script>
</body>
</html>
